services:
  ml-api:
    build: 
      context: .. 
      dockerfile: Dockerfile 
    container_name: ml-api-service
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always